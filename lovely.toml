[manifest]
version = "1.0.0"
dump_lua = true
priority = 10

[[patches]]
[patches.pattern]
target = "cardarea.lua"
pattern = "function CardArea:draw()"
position = "before"
payload = '''
local temp_sell = {label = '$0'}'''
match_indent = true

[[patches]]
[patches.pattern]
target = "cardarea.lua"
pattern = "function CardArea:draw()"
position = "after"
payload = '''
if self == G.consumeables then
    local _val = 0
    if G.jokers then
        for i = 1, #G.jokers.cards do
            if G.jokers.cards[i].ability.set == 'Joker' then
                _val = _val + G.jokers.cards[i].sell_cost
            end
        end
    end
    temp_sell.label = "$" .. _val
end'''
match_indent = true

[[patches]]
[patches.pattern]
target = "cardarea.lua"
pattern = "{n=G.UIT.T, config={ref_table = self.config, ref_value = 'card_count', scale = 0.3, colour = G.C.WHITE}},"
position = "before"
payload = '''
self == G.consumeables and {n=G.UIT.T, config={ref_table = temp_sell, ref_value = 'label', scale = 0.3, colour = G.C.WHITE}} or nil,
self == G.consumeables and {n=G.UIT.B, config={w = 0.1,h=0.1}} or nil,
'''
match_indent = true
